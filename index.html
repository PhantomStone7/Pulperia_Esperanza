<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>⚽</text></svg>">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/tabler-icons/2.47.0/iconfont/tabler-icons.min.css">
<style>
  :root {
    --color-background-primary: #ffffff;
    --color-background-secondary: #F1EFE8;
    --color-background-tertiary: #F8F7F3;
    --color-background-success: #639922;
    --color-background-info: #E6F1FB;
    --color-background-warning: #FAEEDA;
    --color-background-danger: #FCEBEB;

    --color-text-primary: #2C2C2A;
    --color-text-secondary: #5F5E5A;
    --color-text-tertiary: #888780;
    --color-text-success: #ffffff;
    --color-text-info: #185FA5;
    --color-text-warning: #854F0B;
    --color-text-danger: #A32D2D;

    --color-border-tertiary: rgba(0,0,0,0.12);
    --color-border-secondary: rgba(0,0,0,0.2);
    --color-border-info: #378ADD;
    --color-border-success: #639922;
    --color-border-warning: #EF9F27;
    --color-border-danger: #E24B4A;

    --border-radius-md: 8px;
    --border-radius-lg: 12px;
    --border-radius-xl: 16px;

    --font-sans: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --color-background-primary: #1E1E1C;
      --color-background-secondary: #2C2C2A;
      --color-background-tertiary: #161615;
      --color-background-success: #27500A;
      --color-background-info: #042C53;
      --color-background-warning: #412402;
      --color-background-danger: #501313;

      --color-text-primary: #F1EFE8;
      --color-text-secondary: #B4B2A9;
      --color-text-tertiary: #888780;
      --color-text-success: #C0DD97;
      --color-text-info: #85B7EB;
      --color-text-warning: #FAC775;
      --color-text-danger: #F09595;

      --color-border-tertiary: rgba(255,255,255,0.12);
      --color-border-secondary: rgba(255,255,255,0.2);
    }
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    font-family: var(--font-sans);
    background: var(--color-background-tertiary);
    color: var(--color-text-primary);
    -webkit-tap-highlight-color: transparent;
  }
  #root { max-width: 480px; margin: 0 auto; min-height: 100vh; }

  input, select {
    width: 100%;
    height: 40px;
    padding: 0 12px;
    border: 0.5px solid var(--color-border-tertiary);
    border-radius: var(--border-radius-md);
    background: var(--color-background-primary);
    color: var(--color-text-primary);
    font-size: 15px;
    font-family: var(--font-sans);
    transition: border-color 150ms ease;
  }
  input:focus, select:focus {
    outline: none;
    border-color: var(--color-border-info);
    box-shadow: 0 0 0 2px var(--color-background-info);
  }
  button { font-family: var(--font-sans); cursor: pointer; }
  button:disabled { opacity: 0.4; cursor: default; }
  @media (hover: hover) and (pointer: fine) {
    button:hover:not(:disabled) { transform: translateY(-1px); }
  }
  button:active:not(:disabled) { transform: scale(0.98); }
  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.5; transform: scale(0.85); }
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translate(-50%, 8px); }
    to { opacity: 1; transform: translate(-50%, 0); }
  }
</style>
</head>
<body>
<div id="root"></div>
